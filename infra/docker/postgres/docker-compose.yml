services:
  postgres:
    image: postgres:17.5-alpine
    container_name: postgres
    env_file: ${SERVICE_PROJECT_ROOT:-../../..}/infra/.env
    command: -p ${POSTGRES_PORT:-5432}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-h", "${POSTGRES_HOST:-postgres}", "-p", "${POSTGRES_PORT:-5432}", "-d", "${POSTGRES_DB:-syncit}", "-U", "${POSTGRES_USER:-syncit}" ]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 1s
      start_interval: 1s