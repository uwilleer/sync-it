services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    env_file: ${SERVICE_PROJECT_ROOT:-../../..}/infra/.env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:2019/config/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  caddy-data:
  caddy-config:
