services:
  vacancy-matcher:
    image: ${ENV_DOCKER_USERNAME:-diplomatgmg}/${ENV_PROJECT_NAME:-syncit}-vacancy-matcher:latest
    container_name: vacancy-matcher
    env_file: ${SERVICE_PROJECT_ROOT:-../../..}/infra/.env
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://vacancy-matcher:${ENV_SERVICE_INTERNAL_PORT:-8000}/health" ]
      interval: 5s
      timeout: 1s
      retries: 3
      start_period: 3s
