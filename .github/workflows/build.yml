# $schema: https://json.schemastore.org/github-workflow.json

name: Building

on:
  workflow_call:

env:
  ENV_MODE: production

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        service: [api-gateway, gpt-api, scraper-api, telegram-bot, vacancy-parser, vacancy-processor, vacancy-matcher]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          context: .
          file: ./infra/docker/${{ matrix.service }}/Dockerfile
          tags: ${{ vars.DOCKER_USERNAME }}/${{ vars.PROJECT_NAME }}-${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ vars.DOCKER_USERNAME }}/${{ vars.PROJECT_NAME }}-${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ vars.DOCKER_USERNAME }}/${{ vars.PROJECT_NAME }}-${{ matrix.service }}:cache,mode=max
